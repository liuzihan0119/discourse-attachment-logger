templates:
  - "templates/postgres.template.yml"
  - "templates/redis.template.yml"
  - "templates/web.template.yml"

expose:
  - "8080:80"

params:
  db_default_text_search_config: "pg_catalog.english"
  upload_size: 100m
  version: v3.5.2

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8

  DISCOURSE_HOSTNAME: "localhost:8080"
  DISCOURSE_DEVELOPER_EMAILS: "admin@example.com"

  DISCOURSE_SMTP_ADDRESS: "localhost"
  DISCOURSE_SMTP_PORT: 1025
  DISCOURSE_SMTP_USER_NAME: ""
  DISCOURSE_SMTP_PASSWORD: ""
  DISCOURSE_SMTP_ENABLE_START_TLS: false

volumes:
  - volume:
      host: /Users/SL/Desktop/project/discourse/discourse_docker/shared/attachment_logger_test
      guest: /shared
  - volume:
      host: /Users/SL/Desktop/project/discourse/discourse_docker/shared/attachment_logger_test/log/var-log
      guest: /var/log
  - volume:
      host: /private/tmp/discourse-attachment-logger-mount
      guest: /var/www/discourse/plugins/discourse-attachment-logger

hooks:
  after_code:
    - exec:
        cd: $home/plugins
        cmd:
          - git clone https://github.com/discourse/docker_manager.git

run:
  - exec: echo "Attachment logger local test container ready"
